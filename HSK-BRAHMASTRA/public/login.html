<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HSK BRAHMASTRA Login</title>

    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

    <div class="container">

        <div class="logo">🚀</div>

        <h1>HSK BRAHMASTRA</h1>

        <p class="subtitle">
            Professional Trading Dashboard
        </p>

        <input
            id="email"
            type="email"
            placeholder="Enter Email"
            autocomplete="email">

        <input
            id="password"
            type="password"
            placeholder="Enter Password"
            autocomplete="current-password">

        <button id="loginBtn">
            Login
        </button>

        <div class="footer">
            Version 1.0.0
        </div>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
